# Server Configuration
server.port=4567
server.threads.min=2
server.threads.max=10
server.threads.idle.timeout=60000

# Database Configuration
db.url=jdbc:sqlserver://localhost:1433;databaseName=restdb;encrypt=true;trustServerCertificate=true
db.user=sa
db.password=YourStrongPassword123
db.pool.max.size=10
db.pool.min.idle=2

# Logging Configuration (for slf4j-simple)
org.slf4j.simpleLogger.defaultLogLevel=INFO
org.slf4j.simpleLogger.showDateTime=true
org.slf4j.simpleLogger.dateTimeFormat=yyyy-MM-dd HH:mm:ss